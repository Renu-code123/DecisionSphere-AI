version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: decisionsphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: decisionsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decisionsphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: decisionsphere_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/decisionsphere
      - SECRET_KEY=super-secret-decisionsphere-ai-token-key-2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app/static:/workspace/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: decisionsphere_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
